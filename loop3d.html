<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Infinite Loop</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden; /* hide scrollbars */
    background: transparent; /* so homepage shows behind */
  }
  body {
    pointer-events: none; /* allow clicks to pass through iframe */
  }
  canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
// ======== Three.js Beads Loop ========

let scene, camera, renderer, beads = [];

scene = new THREE.Scene();

// Camera
camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 8;

// Renderer
renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Beads Loop
const beadCount = 150;
const radius = 2;
for (let i = 0; i < beadCount; i++) {
  const geometry = new THREE.SphereGeometry(0.05, 16, 16);
  const material = new THREE.MeshStandardMaterial({ 
    color: new THREE.Color(`hsl(${i*2}, 100%, 50%)`),
    metalness: 0.7,
    roughness: 0.2
  });
  const bead = new THREE.Mesh(geometry, material);
  const angle = (i / beadCount) * Math.PI * 2;
  bead.position.set(Math.cos(angle)*radius, Math.sin(angle)*radius, 0);
  beads.push(bead);
  scene.add(bead);
}

// Light
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// Cursor interaction
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', (e)=>{
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// Animate
function animate(){
  requestAnimationFrame(animate);
  beads.forEach((bead, i)=>{
    const angle = (i / beadCount) * Math.PI * 2 + Date.now() * 0.001;
    bead.position.x = Math.cos(angle + mouseX) * radius;
    bead.position.y = Math.sin(angle + mouseY) * radius;
  });
  renderer.render(scene, camera);
}
animate();

// Responsive
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
